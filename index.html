<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null}}
  static getDerivedStateFromError(error){return{hasError:true,error:error}}
  componentDidCatch(error,info){console.error("USOINT Error:",error,info)}
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{padding:40,fontFamily:"monospace",color:"#dc2626",background:"#fef2f2",margin:20,borderRadius:8}},
        React.createElement("h2",null,"Errore nell'applicazione"),
        React.createElement("pre",{style:{fontSize:12,whiteSpace:"pre-wrap"}},String(this.state.error)),
        React.createElement("button",{onClick:function(){localStorage.clear();location.reload()},style:{marginTop:16,padding:"8px 16px",background:"#dc2626",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}},"Reset e ricarica")
      );
    }
    return this.props.children;
  }
}
const LS={get:k=>{try{const v=localStorage.getItem(k);return v?{value:v}:null}catch(ex){return null}},set:(k,v)=>{try{localStorage.setItem(k,v);return true}catch(ex){return false}},del:k=>{try{localStorage.removeItem(k)}catch(ex){}}};
const MESI=["GEN","FEB","MAR","APR","MAG","GIU","LUG","AGO","SET","OTT","NOV","DIC"];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const calcCY=(s,e)=>{if(!s||!e)return[];const sd=new Date(s),ed=new Date(e);if(isNaN(sd)||isNaN(ed)||ed<=sd)return[];const r=[];for(let y=sd.getFullYear();y<=ed.getFullYear();y++){const fm=y===sd.getFullYear()?sd.getMonth():0,lm=y===ed.getFullYear()?ed.getMonth():11,ms=[];for(let m=fm;m<=lm;m++)ms.push({month:m,label:MESI[m]});r.push({year:y,months:ms,n:ms.length,partial:ms.length<12})}return r};
const mkP=n=>({nome:"",voce:"",inq:"",oreT:0,eur:0,cofin:0,aOre:Array(n).fill(0),aElim:Array(n).fill(0),eurA:Array(n).fill(0),md:Array.from({length:n},()=>Array(12).fill(0))});
const mkB=n=>({voce:"",forf:0,cofin:0,aImp:Array(n).fill(0),aElim:Array(n).fill(0),md:Array.from({length:n},()=>Array(12).fill(0))});
const fmt=v=>v===0?"—":"€ "+v.toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2});
const fO=v=>v===0?"—":v.toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2});
const fP=v=>v===0?"—":v.toFixed(1)+"%";
function cP(p,cy,vin){const E=p.eur,D=p.oreT,H=p.cofin,F=D*E,G=F-H,I=F?G*100/F:0,J=100-I;const yrs=[];let carry=0;for(let yi=0;yi<cy.length;yi++){const c=cy[yi],md=p.md[yi]||Array(12).fill(0);const eRate=(p.eurA&&p.eurA[yi])?p.eurA[yi]:E;const oE=c.months.reduce((a,m)=>a+(md[m.month]||0),0),iE=oE*eRate,oA=p.aOre[yi]||0,iAlloc=oA*eRate,oD=oA+carry,oR=oD-oE,el=p.aElim[yi]||0,pc=oD>0?oE/oD*100:0;const ov=vin&&oA>0&&oE>oD,nr=vin&&oA>0&&pc>=90&&!ov;yrs.push({oA,oD,oE,iE,oR,el,pc,ov,nr,eRate,iAlloc,mI:md.map(o=>o*eRate)});carry=oR-el}const tO=yrs.reduce((a,y)=>a+y.oE,0),tI=yrs.reduce((a,y)=>a+y.iE,0);const lastE=yrs.length&&yrs[yrs.length-1].eRate||E;const fR=yrs.length?yrs[yrs.length-1].oR-yrs[yrs.length-1].el:0;return{F,G,I,J,yrs,tO,tI,fR,fRI:fR*lastE,EX:tI/100*I}}
function cB(b,cy,vin){const F=b.forf,H=b.cofin,G=F-H,I=F?G*100/F:0,J=100-I;const yrs=[];let carry=0;for(let yi=0;yi<cy.length;yi++){const c=cy[yi],md=b.md[yi]||Array(12).fill(0);const iE=c.months.reduce((a,m)=>a+(md[m.month]||0),0),iA=b.aImp[yi]||0,iD=iA+carry,iR=iD-iE,el=b.aElim[yi]||0,pc=iD>0?iE/iD*100:0;const ov=vin&&iA>0&&iE>iD,nr=vin&&iA>0&&pc>=90&&!ov;yrs.push({iA,iD,iE,iR,el,pc,ov,nr});carry=iR-el}const tI=yrs.reduce((a,y)=>a+y.iE,0),fR=yrs.length?yrs[yrs.length-1].iR-yrs[yrs.length-1].el:0;return{F,G,I,J,yrs,tI,fR,EX:tI/100*I}}

const fmtN=(v,dec)=>{if(v===0||v===null||v===undefined)return"0,00";return v.toLocaleString("it-IT",{minimumFractionDigits:dec||2,maximumFractionDigits:dec||2})};
const fmtE=(v)=>{if(v===0||v===null||v===undefined)return"€ 0,00";return"€ "+v.toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2})};
const parseNum=(s)=>{if(!s||s==="")return 0;var clean=String(s).replace(/\./g,"").replace(",",".");var n=parseFloat(clean);return isNaN(n)?0:Math.round(n*100)/100};

function NumIn({value,onChange,style,w,eur}){
  const[txt,setTxt]=useState("");
  const[focused,setFocused]=useState(false);
  useEffect(()=>{if(!focused){setTxt(eur?fmtE(value||0):fmtN(value||0))}},[value,focused,eur]);
  return(<input type="text" value={focused?txt:eur?fmtE(value||0):fmtN(value||0)}
    onFocus={e=>{setFocused(true);setTxt(value?String(value).replace(".",","):"")}}
    onChange={e=>{var v=e.target.value;setTxt(v)}}
    onBlur={e=>{setFocused(false);var n=parseNum(txt);onChange(n)}}
    style={{width:w||"100%",boxSizing:"border-box",border:"1.5px solid #d0d5dd",background:"#fffde7",color:(!focused&&(value===0||!value))?"#c8ced6":"#1e293b",padding:"4px 6px",fontSize:11,fontFamily:"'Lato','Leelawadee UI','Segoe UI',sans-serif",textAlign:"center",borderRadius:4,...(style||{})}}/>);
}
const In=({value,onChange,type="number",style={},placeholder="",step,w})=>{
  if(type==="text"||type==="date")return(<input type={type} value={value!=null?value:""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:w||"100%",boxSizing:"border-box",border:"1.5px solid #d0d5dd",background:"#fffde7",color:"#1e293b",padding:"4px 6px",fontSize:11,fontFamily:"'Lato','Leelawadee UI','Segoe UI',sans-serif",textAlign:type==="date"?"center":"left",borderRadius:4,...style}}/>);
  return(<NumIn value={value} onChange={onChange} w={w} style={style}/>);
};
const Sel=({value,onChange,options,w,style={}})=>(<select value={value||""} onChange={e=>onChange(e.target.value)} style={{width:w||"100%",boxSizing:"border-box",border:"1.5px solid #d0d5dd",background:"#fffde7",color:"#1e293b",padding:"3px 4px",fontSize:10,fontFamily:"'Lato','Leelawadee UI','Segoe UI',sans-serif",borderRadius:4,cursor:"pointer",...style}}>{options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>);
const Cv=({v,f=fmt,style={}})=>{const neg=v<-0.005;const isZero=v===0||v===null||v===undefined;return<span style={{textAlign:"center",display:"inline-block",width:"100%",fontFamily:"'Lato','Leelawadee UI','Segoe UI',sans-serif",fontSize:10,fontWeight:neg?700:isZero?400:500,color:neg?"#dc2626":isZero?"#c8ced6":"#1e293b",...style}}>{f(v)}</span>};
const PBar=({pc,ov,nr})=>{const w=Math.min(pc,100),bg=ov?"#dc2626":nr?"#d97706":"#16a34a";return<div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:50,height:6,background:"#e2e8f0",borderRadius:3,overflow:"hidden"}}><div style={{width:w+"%",height:"100%",background:bg,borderRadius:3}}/></div><span style={{fontSize:9,fontWeight:600,color:ov?"#dc2626":nr?"#d97706":"#16a34a"}}>{pc.toFixed(0)}%</span></div>};
const StsP=(yc,vin)=>{if(!yc||!vin||yc.oA<=0)return<span style={{fontSize:9,color:"#94a3b8"}}>R: {fO(yc?yc.oR:0)}</span>;if(yc.ov)return<span style={{background:"#fef2f2",color:"#dc2626",fontSize:9,padding:"2px 6px",borderRadius:4,fontWeight:700,border:"1px solid #fca5a5"}}>⛔ +{fO(Math.abs(yc.oR))}</span>;if(yc.nr)return<span style={{background:"#fffbeb",color:"#d97706",fontSize:9,padding:"2px 6px",borderRadius:4,fontWeight:600,border:"1px solid #fde68a"}}>⚠ {fO(yc.oR)}</span>;return<span style={{fontSize:9,color:"#16a34a",fontWeight:600}}>✓ {fO(yc.oR)} disp.</span>};
const StsB=(yc,vin)=>{if(!yc||!vin||yc.iA<=0)return<span style={{fontSize:9,color:"#94a3b8"}}>R: {fmt(yc?yc.iR:0)}</span>;if(yc.ov)return<span style={{background:"#fef2f2",color:"#dc2626",fontSize:9,padding:"2px 6px",borderRadius:4,fontWeight:700,border:"1px solid #fca5a5"}}>⛔ +{fmt(Math.abs(yc.iR))}</span>;if(yc.nr)return<span style={{background:"#fffbeb",color:"#d97706",fontSize:9,padding:"2px 6px",borderRadius:4,fontWeight:600,border:"1px solid #fde68a"}}>⚠ {fmt(yc.iR)}</span>;return<span style={{fontSize:9,color:"#16a34a",fontWeight:600}}>✓ {fmt(yc.iR)} disp.</span>};
const bPri={background:"#3b82f6",border:"none",color:"#fff",padding:10,borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:700};
const bSec={background:"#fff",border:"1.5px solid #e2e8f0",color:"#64748b",padding:7,borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:500};
const bSm={background:"#fff",border:"1.5px solid #e2e8f0",padding:"5px 10px",borderRadius:6,cursor:"pointer",fontSize:12,color:"#64748b"};
const bCh={padding:16,borderRadius:10,cursor:"pointer",textAlign:"center",background:"#fff"};
const wC={background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:24,boxShadow:"0 1px 3px rgba(0,0,0,.06)"};
const wH={color:"#1e293b",fontSize:16,marginBottom:16,marginTop:0,fontWeight:700};
const lbl={fontSize:12,color:"#475569",display:"block",marginBottom:4,fontWeight:600};
const RH=26;
const Cell=({children,style={}})=><div style={{height:RH,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 2px",border:"1px solid #d0d5dd",...style}}>{children}</div>;
const HCell=({children,style={}})=><div style={{height:20,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 2px",fontSize:9,fontWeight:700,color:"#475569",border:"1px solid #b0bcc8",whiteSpace:"nowrap",...style}}>{children}</div>;

function App(){
  const[projects,setProjects]=useState([]);const[aid,setAid]=useState(null);const[ld,setLd]=useState(true);
  const[pinOk,setPinOk]=useState(false);
  const[pinVal,setPinVal]=useState("");
  const[pinErr,setPinErr]=useState("");
  const[pinMode,setPinMode]=useState("check");
  useEffect(function(){var s=LS.get("usoint-pin");if(!s)setPinMode("set")},[]);
  useEffect(()=>{const r=LS.get("usoint-idx");if(r)setProjects(JSON.parse(r.value));setLd(false)},[]);
  const sI=l=>{setProjects(l);LS.set("usoint-idx",JSON.stringify(l))};
  const cr=(t,s,e,v,nP,nB,col)=>{const id=uid(),nY=calcCY(s,e).length;LS.set("usoint-p-"+id,JSON.stringify({id,title:t,start:s,end:e,vincolo:v,colore:col||"#e3f0fc",personnel:Array.from({length:nP},()=>mkP(nY)),beni:Array.from({length:nB},()=>mkB(nY)),fatture:[]}));sI([...projects,{id,title:t,start:s,end:e,vincolo:v}]);setAid(id)};
  const dp=id=>{const r=LS.get("usoint-p-"+id);if(!r)return;const src=JSON.parse(r.value),nid=uid(),d={...src,id:nid,title:src.title+" (copia)"};LS.set("usoint-p-"+nid,JSON.stringify(d));sI([...projects,{id:nid,title:d.title,start:src.start,end:src.end,vincolo:src.vincolo}]);setAid(nid)};
  const dl=id=>{LS.del("usoint-p-"+id);sI(projects.filter(p=>p.id!==id));if(aid===id)setAid(null)};
  function pinSubmit(){
    if(pinMode==="set"){
      if(pinVal.length<1||pinVal.length>6||!/^\d+$/.test(pinVal)){setPinErr("Da 1 a 6 cifre");return}
      LS.set("usoint-pin",pinVal);setPinOk(true);return;
    }
    var s=LS.get("usoint-pin");
    if(s&&pinVal===s.value){setPinOk(true)}else{setPinErr("PIN errato");setPinVal("")}
  }
  if(!pinOk)return(<div style={{minHeight:"100vh",background:"linear-gradient(160deg,#e8f0fe,#f0f4f8 50%,#eef2f7)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Lato',sans-serif"}}>
    <div style={{background:"#fff",borderRadius:12,padding:"32px 40px",boxShadow:"0 4px 24px rgba(0,0,0,.08)",textAlign:"center",minWidth:300}}>
      <div style={{fontSize:10,color:"#3b82f6",letterSpacing:3,fontWeight:700,marginBottom:4}}>USOINT</div>
      <div style={{fontSize:16,fontWeight:700,color:"#1e293b",marginBottom:20}}>Rendicontazione Interna</div>
      <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>{pinMode==="set"?"Imposta un PIN (max 6 cifre)":"Inserisci il PIN"}</div>
      <input type="password" inputMode="numeric" maxLength={6} value={pinVal} onChange={function(e){setPinVal(e.target.value.replace(/\D/g,"").substring(0,6));setPinErr("")}} onKeyDown={function(e){if(e.key==="Enter")pinSubmit()}} style={{width:160,textAlign:"center",fontSize:24,letterSpacing:8,padding:"10px 16px",border:"2px solid #d0d5dd",borderRadius:8,outline:"none",fontFamily:"monospace"}} autoFocus={true} placeholder="......"/>
      {pinErr?<div style={{color:"#dc2626",fontSize:11,marginTop:6,fontWeight:600}}>{pinErr}</div>:null}
      <div style={{marginTop:16}}><button onClick={pinSubmit} style={{padding:"8px 32px",fontSize:13,fontWeight:700,color:"#fff",background:"#3b82f6",border:"none",borderRadius:8,cursor:"pointer"}}>{pinMode==="set"?"Imposta":"Accedi"}</button></div>
      {pinMode==="check"?<div style={{marginTop:12}}><button onClick={function(){if(confirm("Resettare il PIN?")){LS.del("usoint-pin");setPinMode("set");setPinVal("")}}} style={{background:"none",border:"none",color:"#94a3b8",fontSize:9,cursor:"pointer",textDecoration:"underline"}}>Reset PIN</button></div>:null}
    </div>
  </div>);
  if(ld)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#94a3b8"}}>Caricamento...</div>;
  if(aid)return<PV pid={aid} onBack={()=>setAid(null)}/>;
  return<Dash projects={projects} onCreate={cr} onOpen={setAid} onDup={dp} onDel={dl}/>;
}

function Dash({projects,onCreate,onOpen,onDup,onDel}){
  const[show,setShow]=useState(false);const[ws,setWs]=useState(0);const[dc,setDc]=useState(null);
  const[cf,setCf]=useState({title:"",start:"",end:"",vincolo:null,nP:6,nB:4,colore:"#e3f0fc"});
  const cy=useMemo(()=>calcCY(cf.start,cf.end),[cf.start,cf.end]);
  const go=()=>{onCreate(cf.title,cf.start,cf.end,cf.vincolo,cf.nP,cf.nB,cf.colore);setShow(false);setWs(0);setCf({title:"",start:"",end:"",vincolo:null,nP:6,nB:4,colore:"#e3f0fc"})};
  return(<div style={{minHeight:"100vh",background:"linear-gradient(160deg,#e8f0fe,#f0f4f8 50%,#eef2f7)"}}>
    <div style={{maxWidth:640,margin:"0 auto",padding:"32px 16px"}}>
      <div style={{textAlign:"center",marginBottom:32}}><div style={{fontSize:12,color:"#3b82f6",letterSpacing:3,fontWeight:700}}>RENDICONTAZIONE INTERNA</div><div style={{fontSize:24,fontWeight:700,color:"#1e293b",marginTop:6}}>I tuoi Progetti</div><div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>I dati sono salvati nel browser di questo PC</div></div>
      {!show&&<>{projects.length===0&&<div style={{textAlign:"center",padding:48,color:"#94a3b8",fontSize:14}}>Nessun progetto ancora.</div>}
        {projects.map(p=>{const c2=calcCY(p.start,p.end);return<div key={p.id} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:16,marginBottom:10,display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 3px rgba(0,0,0,.06)",cursor:"pointer"}} onClick={()=>onOpen(p.id)}>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:"#1e293b"}}>{p.title}</div><div style={{fontSize:11,color:"#64748b",marginTop:3}}>{new Date(p.start).toLocaleDateString("it-IT")} → {new Date(p.end).toLocaleDateString("it-IT")} · {c2.map(y=>y.year).join(", ")}</div><div style={{fontSize:10,marginTop:4}}>{p.vincolo?<span style={{color:"#d97706",fontWeight:600}}>🔒 Vincolo</span>:<span style={{color:"#16a34a",fontWeight:600}}>🔓 Libero</span>}</div></div>
          <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}><button onClick={()=>onDup(p.id)} style={{...bSm,color:"#3b82f6"}} title="Duplica">📋 Duplica</button>{dc===p.id?<><button onClick={()=>{onDel(p.id);setDc(null)}} style={{...bSm,color:"#fff",background:"#dc2626",borderColor:"#dc2626"}}>Conferma</button><button onClick={()=>setDc(null)} style={bSm}>Annulla</button></>:<button onClick={()=>setDc(p.id)} style={{...bSm,color:"#dc2626",borderColor:"#fca5a5"}}>🗑 Elimina</button>}</div>
        </div>})}
        <button onClick={()=>setShow(true)} style={{...bPri,width:"100%",marginTop:14}}>+ Nuovo Progetto</button>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button onClick={function(){
            var bk={};for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.indexOf("usoint")===0)bk[k]=localStorage.getItem(k)}
            var bl=new Blob([JSON.stringify(bk,null,2)],{type:"application/json"});
            var a=document.createElement("a");a.href=URL.createObjectURL(bl);
            a.download="USOINT_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();
          }} style={{...bSec,flex:1,fontSize:11}}>💾 Backup dati</button>
          <button onClick={function(){
            var inp=document.createElement("input");inp.type="file";inp.accept=".json";
            inp.onchange=function(e){
              var f=e.target.files[0];if(!f)return;
              var rd=new FileReader();rd.onload=function(ev){
                try{
                  var d=JSON.parse(ev.target.result);var n=0;
                  for(var k in d){if(k.indexOf("usoint")===0){localStorage.setItem(k,d[k]);n++}}
                  alert("Ripristinati "+n+" elementi. La pagina si ricaricherà.");location.reload();
                }catch(ex){alert("File non valido: "+ex.message)}
              };rd.readAsText(f);
            };inp.click();
          }} style={{...bSec,flex:1,fontSize:11}}>📂 Ripristina backup</button>
        </div>
      </>}
      {show&&<div>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:20}}>{[0,1,2].map(s=><div key={s} style={{width:40,height:5,borderRadius:3,background:ws>=s?"#3b82f6":"#e2e8f0"}}/>)}</div>

      </div>}
    </div>
  </div>);
}

function PV({pid,onBack}){
  const[data,setData]=useState(null);const[aYI,setAYI]=useState(0);const[mo,setMo]=useState(false);const[saved,setSaved]=useState(false);

        </tbody>
      </table>
      {function(){

      {function(){var totFatt=FT.reduce(function(a,f){return a+f.importo},0);var totAcconti=FT.filter(function(f){return f.tipo==="acconto"}).reduce(function(a,f){return a+f.importo},0);var totSaldi=FT.filter(function(f){return f.tipo==="saldo"}).reduce(function(a,f){return a+f.importo},0);var totSpesoFin=pC.reduce(function(a,c){return a+c.EX},0)+bC.reduce(function(a,c){return a+c.EX},0);var budgetFin=pC.reduce(function(a,c){return a+c.F*c.I/100},0)+bC.reduce(function(a,c){return a+c.F*c.I/100},0);var diffSpeso=totFatt-totSpesoFin;var diffBudget=budgetFin-totFatt;return(

    </div>
